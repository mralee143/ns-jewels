services:
  mysql:
    image: mysql:8.4
    container_name: ns-jewels-db
    restart: unless-stopped
    ports:
      # Host 3307 avoids clashing with another MySQL (or XAMPP) on 3306. MySQL in the container stays on 3306.
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ns_root
      MYSQL_USER: ns_app
      MYSQL_PASSWORD: ns_app
      MYSQL_DATABASE: ns_jewels
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --host=127.0.0.1 --user=ns_app --password=ns_app --silent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
