services:
  postgres:
    image: postgres:16
    container_name: ns-jewels-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nsjewels
      POSTGRES_PASSWORD: ns-app
      POSTGRES_DB: ns-jewels
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsjewels -d ns-jewels"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
