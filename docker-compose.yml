services:
  postgres:
    image: postgres:16
    container_name: ns-jewels-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nsjewels
      POSTGRES_PASSWORD: ns-app
      POSTGRES_DB: ns-jewels
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsjewels -d ns-jewels"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: run the built image locally with correct DB networking (not for `npm run dev` on the host).
  # app:
  #   image: aleehaider045/ns-jewels:latest
  #   build: .
  #   restart: unless-stopped
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_USER: nsjewels
  #     DB_PASSWORD: ns-app
  #     DB_NAME: ns-jewels
  #     AUTH_SECRET: change-me
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
